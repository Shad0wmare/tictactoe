<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Tic-Tac-Toe Go AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Крестики-Нолики (vs Go AI)</h1>
        
        <div id="menu">
            <button onclick="createNewGame()">Новая игра</button>
            <button onclick="showLoadInput()">Загрузить игру</button>
        </div>

        <div id="load-input" class="hidden">
            <input type="text" id="uuid-field" placeholder="Введите UUID игры">
            <button onclick="loadGame()">ОК</button>
            <button onclick="showMenu()">Назад</button>
        </div>

        <div id="game-screen" class="hidden">
            <p>ID игры: <span id="game-id-display"></span></p>
            <div id="board" class="board"></div>
            <p id="status-message"></p>
            <button onclick="showMenu()">В меню</button>
        </div>
        
        <p id="error-message" class="error"></p>
    </div>
    <script src="app.js"></script>
</body>
</html>
